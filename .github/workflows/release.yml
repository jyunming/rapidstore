name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── Linux (manylinux) ───────────────────────────────────────────────────────
  # manylinux containers ship CPython 3.10–3.13; no setup-python needed.
  linux:
    name: Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── Windows ─────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  windows:
    name: Windows wheels (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64-py${{ matrix.python-version }}
          path: dist

  # ── macOS ────────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  macos:
    name: macOS wheels (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  # ── Source distribution ──────────────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── GitHub Release + PyPI publish ────────────────────────────────────────────
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List dist contents
        run: ls -lh dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from git log
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "## What's Changed" > CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md

          FEATURES=$(git log $RANGE --oneline --no-merges --grep="^feat" 2>/dev/null || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> CHANGELOG_RELEASE.md
            git log $RANGE --oneline --no-merges --grep="^feat" | sed 's/^/- /' >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
          fi

          PERF=$(git log $RANGE --oneline --no-merges --grep="^perf" 2>/dev/null || true)
          if [ -n "$PERF" ]; then
            echo "### ⚡ Performance" >> CHANGELOG_RELEASE.md
            git log $RANGE --oneline --no-merges --grep="^perf" | sed 's/^/- /' >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
          fi

          FIXES=$(git log $RANGE --oneline --no-merges --grep="^fix" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG_RELEASE.md
            git log $RANGE --oneline --no-merges --grep="^fix" | sed 's/^/- /' >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
          fi

          echo "### 📋 All Changes" >> CHANGELOG_RELEASE.md
          git log $RANGE --oneline --no-merges | sed 's/^/- /' >> CHANGELOG_RELEASE.md

          echo "Generated changelog:"
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TurboQuantDB v${{ steps.version.outputs.VERSION }}"
          body_path: CHANGELOG_RELEASE.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
