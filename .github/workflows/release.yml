name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write   # required for PyPI Trusted Publisher (OIDC)

jobs:
  # ── Linux (manylinux) ───────────────────────────────────────────────────────
  # manylinux containers ship CPython 3.10–3.13; no setup-python needed.
  # aarch64 uses manylinux_2_28 (GCC 12) because manylinux2014's GCC 4.8 does
  # not recognise -Wdate-time, which causes libmimalloc-sys to fail to compile.
  linux:
    name: Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: auto
          - target: aarch64
            manylinux: "2_28"
    steps:
      - uses: actions/checkout@v4

      # Build the server binary on the host (x86_64 only; aarch64 cross-compilation
      # would require 'cross' + Docker-in-Docker which is too heavy for CI).
      # The maturin-action mounts the working directory, so _bin/ is visible inside
      # the container and gets packaged by the include = ["python/tqdb/_bin/*"] glob.
      - name: Build server binary (x86_64)
        if: matrix.target == 'x86_64'
        run: |
          cargo build --release --manifest-path server/Cargo.toml
          mkdir -p python/tqdb/_bin
          cp server/target/release/tqdb-server python/tqdb/_bin/

      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -i 3.10 -i 3.11 -i 3.12 -i 3.13
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── Windows ─────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  windows:
    name: Windows wheels (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and bundle server binary
        shell: bash
        run: |
          cargo build --release --manifest-path server/Cargo.toml
          mkdir -p python/tqdb/_bin
          cp server/target/release/tqdb-server.exe python/tqdb/_bin/

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64-py${{ matrix.python-version }}
          path: dist

  # ── macOS ────────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  macos:
    name: macOS wheels (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # macos-latest is arm64; x86_64 requires cross-compilation.
      # Build the server binary for the matching Apple target before maturin.
      - name: Build and bundle server binary
        shell: bash
        run: |
          APPLE_TARGET="${{ matrix.target }}-apple-darwin"
          rustup target add "$APPLE_TARGET" 2>/dev/null || true
          cargo build --release --target "$APPLE_TARGET" --manifest-path server/Cargo.toml
          mkdir -p python/tqdb/_bin
          cp "server/target/${APPLE_TARGET}/release/tqdb-server" python/tqdb/_bin/

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  # ── Source distribution ──────────────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── GitHub Release + PyPI publish ────────────────────────────────────────────
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    permissions:
      contents: write
      id-token: write   # required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List dist contents
        run: ls -lh dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Extract the section for this version: from "## [VERSION]" up to (not including) the next "## ["
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > CHANGELOG_RELEASE.md

          if [ ! -s CHANGELOG_RELEASE.md ]; then
            echo "WARNING: No section found for [${VERSION}] in CHANGELOG.md — falling back to empty body"
            echo "(No changelog entry found for v${VERSION})" > CHANGELOG_RELEASE.md
          fi

          echo "Release notes for v${VERSION}:"
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TurboQuantDB v${{ steps.version.outputs.VERSION }}"
          body_path: CHANGELOG_RELEASE.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  # Version badge is now fetched at runtime via GitHub releases API in script.js
  # No CI push to main needed — pyproject.toml is the single source of truth.
