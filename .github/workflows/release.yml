name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write   # required for PyPI Trusted Publisher (OIDC)

jobs:
  # ── Linux (manylinux) ───────────────────────────────────────────────────────
  # manylinux containers ship CPython 3.10–3.13; no setup-python needed.
  # aarch64 uses manylinux_2_28 (GCC 12) because manylinux2014's GCC 4.8 does
  # not recognise -Wdate-time, which causes libmimalloc-sys to fail to compile.
  linux:
    name: Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: auto
          - target: aarch64
            manylinux: "2_28"
    steps:
      - uses: actions/checkout@v4

      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -i 3.10 -i 3.11 -i 3.12 -i 3.13
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── Windows ─────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  windows:
    name: Windows wheels (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64-py${{ matrix.python-version }}
          path: dist

  # ── macOS ────────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  macos:
    name: macOS wheels (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  # ── Source distribution ──────────────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── GitHub Release + PyPI publish ────────────────────────────────────────────
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    permissions:
      contents: write
      id-token: write   # required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List dist contents
        run: ls -lh dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from git log
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "## What's Changed" > CHANGELOG_RELEASE.md
          echo "" >> CHANGELOG_RELEASE.md

          FEATURES=$(git log $RANGE --oneline --no-merges --grep="^feat" 2>/dev/null || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> CHANGELOG_RELEASE.md
            git log $RANGE --oneline --no-merges --grep="^feat" | sed 's/^/- /' >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
          fi

          PERF=$(git log $RANGE --oneline --no-merges --grep="^perf" 2>/dev/null || true)
          if [ -n "$PERF" ]; then
            echo "### ⚡ Performance" >> CHANGELOG_RELEASE.md
            git log $RANGE --oneline --no-merges --grep="^perf" | sed 's/^/- /' >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
          fi

          FIXES=$(git log $RANGE --oneline --no-merges --grep="^fix" 2>/dev/null || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> CHANGELOG_RELEASE.md
            git log $RANGE --oneline --no-merges --grep="^fix" | sed 's/^/- /' >> CHANGELOG_RELEASE.md
            echo "" >> CHANGELOG_RELEASE.md
          fi

          echo "### 📋 All Changes" >> CHANGELOG_RELEASE.md
          git log $RANGE --oneline --no-merges | sed 's/^/- /' >> CHANGELOG_RELEASE.md

          echo "Generated changelog:"
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TurboQuantDB v${{ steps.version.outputs.VERSION }}"
          body_path: CHANGELOG_RELEASE.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  # ── Update website badge + CHANGELOG.md ──────────────────────────────────────
  # Branch protection on main requires PRs, so we push to a release-docs branch
  # and open a PR. Merge it to complete the release docs update.
  update-docs:
    name: Update website badge and CHANGELOG.md
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # full history needed for git log range

      - name: Patch version badge in index.html
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s|<div class=\"badge\">v[^<]*</div>|<div class=\"badge\">${VERSION} Released</div>|g" website/index.html
          echo "Updated badge to: ${VERSION} Released"

      - name: Prepend release entry to CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          TODAY=$(date -u '+%Y-%m-%d')

          # Determine commit range since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          # Build the new changelog block
          {
            echo "## [${VERSION}] — ${TODAY}"
            echo ""

            FEATS=$(git log $RANGE --oneline --no-merges --grep="^feat" 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "### Added"
              git log $RANGE --oneline --no-merges --grep="^feat" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            FIXES=$(git log $RANGE --oneline --no-merges --grep="^fix" 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "### Fixed"
              git log $RANGE --oneline --no-merges --grep="^fix" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            PERFS=$(git log $RANGE --oneline --no-merges --grep="^perf" 2>/dev/null || true)
            if [ -n "$PERFS" ]; then
              echo "### Performance"
              git log $RANGE --oneline --no-merges --grep="^perf" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            REFACTORS=$(git log $RANGE --oneline --no-merges --grep="^refactor\|^chore\|^docs" 2>/dev/null || true)
            if [ -n "$REFACTORS" ]; then
              echo "### Changed"
              git log $RANGE --oneline --no-merges --grep="^refactor\|^chore\|^docs" | sed 's/^[a-f0-9]* /- /'
              echo ""
            fi

            echo "---"
            echo ""
          } > NEW_SECTION.md

          # Insert after the [Unreleased] block (after the "---" that follows it)
          # Pattern: find "## [Unreleased]", skip to the next "---", then insert
          awk '
            /^## \[Unreleased\]/ { print; unreleased=1; next }
            unreleased && /^---/ {
              print
              print ""
              while ((getline line < "NEW_SECTION.md") > 0) print line
              close("NEW_SECTION.md")
              unreleased=0
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md

          echo "CHANGELOG.md updated for ${TAG}:"
          head -30 CHANGELOG.md

      - name: Commit and open PR (branch protection requires PR to merge to main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "jyunming"
          git config user.email "69726231+jyunming@users.noreply.github.com"
          git add website/index.html CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes — skipping"
          else
            BRANCH="chore/release-docs-${GITHUB_REF_NAME}"
            git checkout -b "${BRANCH}"
            git commit -m "chore(release): bump version badge and CHANGELOG for ${GITHUB_REF_NAME}"
            git push origin "${BRANCH}"
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(release): bump version badge and CHANGELOG for ${GITHUB_REF_NAME}" \
              --body "Auto-generated by the release workflow. Merge to complete the ${GITHUB_REF_NAME} release docs update."
          fi
