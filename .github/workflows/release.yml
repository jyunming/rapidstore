name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write   # required for PyPI Trusted Publisher (OIDC)

jobs:
  # ── Linux (manylinux) ───────────────────────────────────────────────────────
  # manylinux containers ship CPython 3.10–3.13; no setup-python needed.
  # aarch64 uses manylinux_2_28 (GCC 12) because manylinux2014's GCC 4.8 does
  # not recognise -Wdate-time, which causes libmimalloc-sys to fail to compile.
  linux:
    name: Linux wheels (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: auto
          - target: aarch64
            manylinux: "2_28"
    steps:
      - uses: actions/checkout@v4

      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -i 3.10 -i 3.11 -i 3.12 -i 3.13
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ── Windows ─────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  windows:
    name: Windows wheels (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist -i python
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64-py${{ matrix.python-version }}
          path: dist

  # ── macOS ────────────────────────────────────────────────────────────────────
  # setup-python only accepts a single version; use a matrix to install each.
  macos:
    name: macOS wheels (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  # ── Source distribution ──────────────────────────────────────────────────────
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── GitHub Release + PyPI publish ────────────────────────────────────────────
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    permissions:
      contents: write
      id-token: write   # required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List dist contents
        run: ls -lh dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Extract the section for this version: from "## [VERSION]" up to (not including) the next "## ["
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            > CHANGELOG_RELEASE.md

          if [ ! -s CHANGELOG_RELEASE.md ]; then
            echo "WARNING: No section found for [${VERSION}] in CHANGELOG.md — falling back to empty body"
            echo "(No changelog entry found for v${VERSION})" > CHANGELOG_RELEASE.md
          fi

          echo "Release notes for v${VERSION}:"
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TurboQuantDB v${{ steps.version.outputs.VERSION }}"
          body_path: CHANGELOG_RELEASE.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  # ── Update website badge + CHANGELOG.md ──────────────────────────────────────
  # Branch protection on main requires PRs, so we push to a release-docs branch
  # and open a PR. Merge it to complete the release docs update.
  update-docs:
    name: Update website badge and CHANGELOG.md
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # full history needed for git log range

      - name: Patch version badge in index.html
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed -i "s|<div class=\"badge\">v[^<]*</div>|<div class=\"badge\">${VERSION} Released</div>|g" website/index.html
          echo "Updated badge to: ${VERSION} Released"

      - name: Commit and open PR (branch protection requires PR to merge to main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "jyunming"
          git config user.email "69726231+jyunming@users.noreply.github.com"
          git add website/index.html
          if git diff --cached --quiet; then
            echo "No changes — skipping"
          else
            BRANCH="chore/release-docs-${GITHUB_REF_NAME}"
            git checkout -b "${BRANCH}"
            git commit -m "chore(release): bump version badge for ${GITHUB_REF_NAME}"
            git push origin "${BRANCH}"
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "chore(release): bump version badge for ${GITHUB_REF_NAME}" \
              --body "Auto-generated by the release workflow. Merge to complete the ${GITHUB_REF_NAME} release docs update."
          fi
