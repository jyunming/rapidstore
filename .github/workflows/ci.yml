name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test --lib
        run: cargo test -q --lib

  python-smoke:
    name: Python smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin + numpy
        run: pip install maturin numpy

      - name: Build dev extension
        run: maturin develop --release

      - name: Smoke test — import, insert, search
        run: |
          python - <<'EOF'
          import numpy as np
          import turboquantdb

          db = turboquantdb.Database.open("/tmp/smoke_db", dimension=16, bits=4)
          vec = np.random.rand(16).astype(np.float32)
          db.insert("id-1", vec, {})
          results = db.search(vec, top_k=1)
          assert len(results) == 1, f"expected 1 result, got {len(results)}"
          print("smoke test OK")
          EOF
