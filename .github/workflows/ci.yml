name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

env:
  # Opt into Node.js 24 runner for all GitHub Actions (suppresses Node 20 EOL warnings).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test --lib
        run: cargo test -q --lib

      - name: cargo check (warnings as errors)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo check -q

      - name: cargo check server (no Python features)
        run: cargo check -q --manifest-path server/Cargo.toml

  python-smoke:
    name: Python smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtualenv
        run: python -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH && echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Install maturin + numpy + pytest
        run: pip install maturin numpy pytest

      - name: Build dev extension
        run: maturin develop --release

      - name: Smoke test — import, insert, search
        run: |
          python - <<'EOF'
          import numpy as np
          import tqdb

          db = tqdb.Database.open("/tmp/smoke_db", dimension=16, bits=4)
          vec = np.random.rand(16).astype(np.float32)
          db.insert("id-1", vec, {})
          results = db.search(vec, top_k=1)
          assert len(results) == 1, f"expected 1 result, got {len(results)}"
          print("smoke test OK")
          EOF

      - name: Run pytest test suite
        run: pytest tests/test_python_api.py -v --tb=short

  perf-gate:
    name: Perf gate (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtualenv
        run: python -m venv .venv && echo "$PWD/.venv/bin" >> $GITHUB_PATH && echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Install benchmark deps
        run: pip install maturin numpy

      - name: Build dev extension
        run: maturin develop --release

      - name: Run sprint perf gate
        run: python benchmarks/sprint_smoke.py
