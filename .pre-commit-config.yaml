# pre-commit configuration for TurboQuantDB
# https://pre-commit.com/
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run manually:
#   pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rust format check
        language: system
        entry: cargo fmt --all --
        args: [--check]
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: Rust compile check
        language: system
        entry: cargo check -q
        types: [rust]
        pass_filenames: false

      - id: cargo-test-lib
        name: Rust unit tests
        language: system
        entry: cargo test -q --lib
        types: [rust]
        pass_filenames: false
